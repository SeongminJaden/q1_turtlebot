# Follow Me 설정

follow_me:
  ros__parameters:
    robot_tag_id: "25A0"
    target_tag_id: "1E52"
    target_distance: 1.0      # 목표 추종 거리 (m)
    distance_tolerance: 0.1   # 허용 오차 (m)
    max_speed: 0.154           # 최대 속도 (burger 0.22 * 70%)
    max_angular: 1.988         # 최대 회전 속도 (burger 2.84 * 70%)
    kp_linear: 0.5
    kp_angular: 1.5
    qf_threshold: 40
    timeout_sec: 2.0
